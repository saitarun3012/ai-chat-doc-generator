<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat → Doc Generator</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        background: #0f172a;
        color: #e5e7eb;
        font-family: Arial, Helvetica, sans-serif;
      }

      .popup {
        padding: 18px;
      }

      h1 {
        margin: 0 0 10px;
        color: #ffffff;
        font-size: 20px;
        line-height: 1.2;
      }

      .description {
        margin: 0 0 16px;
        color: #cbd5e1;
        font-size: 13px;
        line-height: 1.5;
      }

      .platforms {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 12px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.7);
        list-style: none;
      }

      .platform {
        display: flex;
        align-items: center;
        gap: 9px;
        color: #f8fafc;
        font-size: 13px;
      }

      .dot {
        width: 8px;
        height: 8px;
        flex: 0 0 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.14);
      }

      .note {
        margin: 16px 0 0;
        padding-top: 14px;
        border-top: 1px solid rgba(148, 163, 184, 0.2);
        color: #94a3b8;
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="popup">
      <h1>AI Chat → Doc Generator</h1>
      <p class="description">Convert any AI chat into structured notes or PDF. Works on ChatGPT, Claude, Gemini, Grok, Perplexity and Copilot.</p>
      <ul class="platforms" aria-label="Supported platforms">
        <li class="platform"><span class="dot" aria-hidden="true"></span>ChatGPT</li>
        <li class="platform"><span class="dot" aria-hidden="true"></span>Claude</li>
        <li class="platform"><span class="dot" aria-hidden="true"></span>Gemini</li>
        <li class="platform"><span class="dot" aria-hidden="true"></span>Grok</li>
        <li class="platform"><span class="dot" aria-hidden="true"></span>Perplexity</li>
        <li class="platform"><span class="dot" aria-hidden="true"></span>Copilot</li>
      </ul>
      <p class="note">Navigate to any supported AI chat and click the Generate Doc button on the page.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
